<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cardbhoard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --pk-blue:#2724DB;--pk-blue-light:#5654f0;
  --pk-red:#FF0015;--pk-red-light:#ff4455;
  --bg:#0e1a2e;--bg-card:rgba(255,255,255,0.06);
  --bg-input:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.12);--border-strong:rgba(255,255,255,0.22);
  --text:#f0f4ff;--text2:#8fa3c0;--text3:#4a607a;
  --glass:rgba(255,255,255,0.07);--glass-hover:rgba(255,255,255,0.13);
  --owned-tint:rgba(40,180,100,0.13);--owned-border:rgba(40,180,100,0.35);
  --radius:10px;--radius-lg:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh;}
#root{max-width:900px;margin:0 auto;padding:24px 16px 80px;}
h1{font-size:20px;font-weight:500;}
input,button{font-family:inherit;font-size:14px;color:var(--text);}
input[type=text]{background:var(--bg-input);border:0.5px solid var(--border);border-radius:var(--radius);padding:9px 13px;outline:none;width:100%;color:var(--text);transition:border-color .18s,box-shadow .18s;}
input[type=text]::placeholder{color:var(--text3);}
input[type=text]:focus{border-color:var(--pk-blue-light);box-shadow:0 0 0 3px rgba(39,36,219,.2);}
input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--pk-blue);flex-shrink:0;}
button{background:var(--glass);border:0.5px solid var(--border);border-radius:var(--radius);padding:8px 16px;cursor:pointer;color:var(--text);transition:background .18s,border-color .18s;}
button:hover{background:var(--glass-hover);border-color:var(--border-strong);}
button:active{transform:scale(.98);}
.btn-blue{background:rgba(39,36,219,.28);border-color:rgba(86,84,240,.5);color:#c0bfff;}
.btn-blue:hover{background:rgba(39,36,219,.45);border-color:var(--pk-blue-light);color:#e0dfff;}
.btn-red{background:rgba(255,0,21,.18);border-color:rgba(255,68,85,.4);color:#ffb0b8;}
.btn-red:hover{background:rgba(255,0,21,.32);border-color:var(--pk-red-light);color:#ffd0d5;}
.btn-green{background:rgba(40,180,100,.2);border-color:rgba(40,180,100,.4);color:#7de8b0;}
.btn-green:hover{background:rgba(40,180,100,.32);color:#a8f0c8;}
.small-btn{font-size:12px;padding:5px 11px;}
.glass-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius-lg);backdrop-filter:blur(12px);}
.app-header{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.header-icon{width:38px;height:38px;border-radius:50%;background:rgba(39,36,219,.25);border:0.5px solid rgba(86,84,240,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tab-bar{display:flex;gap:4px;background:rgba(255,255,255,.05);border:0.5px solid var(--border);border-radius:13px;padding:4px;margin-bottom:22px;}
.tab-btn{flex:1;padding:9px 4px;text-align:center;font-size:13px;color:#fff;border-radius:10px;cursor:pointer;border:none;background:none;transition:background .22s,box-shadow .22s;font-weight:400;}
.tab-btn:hover:not(.active-blue):not(.active-red){background:var(--glass-hover);}
.tab-btn.active-blue{background:var(--pk-blue);color:#fff;font-weight:500;box-shadow:0 2px 14px rgba(39,36,219,.55);}
.tab-btn.active-red{background:var(--pk-red);color:#fff;font-weight:500;box-shadow:0 2px 14px rgba(255,0,21,.45);}
.badge{display:inline-block;background:rgba(255,255,255,.18);color:#fff;border-radius:10px;padding:1px 6px;font-size:11px;margin-left:4px;}
.pill-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.pill{display:inline-flex;align-items:center;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid var(--border);background:var(--glass);color:var(--text);backdrop-filter:blur(8px);transition:all .18s;}
.pill:hover{background:var(--glass-hover);border-color:var(--border-strong);}
.pill.pill-blue{background:rgba(39,36,219,.22);border-color:rgba(86,84,240,.45);color:#c0bfff;font-weight:500;}
.pill.pill-red{background:rgba(255,0,21,.18);border-color:rgba(255,68,85,.4);color:#ffb0b8;font-weight:500;}
.set-card{padding:16px;margin-bottom:12px;}
.set-top{display:flex;gap:14px;align-items:flex-start;margin-bottom:12px;}
.set-name{font-size:15px;font-weight:500;margin-bottom:2px;}
.set-sub{font-size:12px;color:var(--text2);margin-bottom:6px;}
.progress-track{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;background:var(--pk-blue);transition:width .4s;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stat-tile{background:rgba(255,255,255,.04);border:0.5px solid var(--border);border-radius:8px;padding:8px 10px;}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:3px;}
.stat-val{font-size:14px;font-weight:500;color:var(--text);}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--glass);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;transition:background .18s;}
.sec-hdr:hover{background:var(--glass-hover);}
.sec-name{font-size:14px;font-weight:500;flex:1;}
.sec-meta{font-size:12px;color:var(--text2);white-space:nowrap;}
.chevron{font-size:11px;color:var(--text3);flex-shrink:0;transition:transform .28s cubic-bezier(.4,0,.2,1);}
.chevron.open{transform:rotate(180deg);}
.collapsible{overflow:hidden;transition:max-height .38s cubic-bezier(.4,0,.2,1),opacity .3s ease;}
.collapsible.open{max-height:9999px;opacity:1;}
.collapsible.closed{max-height:0;opacity:0;}
.grand-total{display:flex;justify-content:space-between;align-items:center;background:rgba(39,36,219,.14);border:0.5px solid rgba(86,84,240,.28);border-radius:var(--radius-lg);padding:13px 16px;margin-bottom:18px;}
.total-lbl{font-size:11px;color:var(--text2);margin-bottom:2px;}
.total-val{font-size:22px;font-weight:500;}
.stat-card{background:var(--glass);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;flex:1 1 140px;}
.stat-card-lbl{font-size:12px;color:var(--text2);margin-bottom:4px;}
.stat-card-val{font-size:22px;font-weight:500;}
.stat-card-grid{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;}
.search-box{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px;}
.empty{color:var(--text2);font-size:14px;padding:30px 0;text-align:center;}
.flex-gap{display:flex;gap:8px;}
.row{display:flex;align-items:center;gap:10px;}
.scrollable{max-height:560px;overflow-y:auto;}
.wishlist-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,0,21,.18);color:#ffb0b8;flex-shrink:0;}
.variant-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:6px;margin-top:3px;background:rgba(255,255,255,.06);color:var(--text2);border:0.5px solid var(--border);}
.no-price-badge{font-size:10px;padding:2px 6px;border-radius:5px;background:rgba(255,255,255,.05);border:0.5px solid var(--border);color:var(--text3);}
.variant-pill{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:9px;background:var(--glass);border:0.5px solid var(--border);margin-bottom:3px;cursor:pointer;user-select:none;transition:background .18s,border-color .18s;}
.variant-pill:hover{background:rgba(39,36,219,.18);border-color:rgba(86,84,240,.4);}
.variant-pill.checked{background:rgba(39,36,219,.2);border-color:rgba(86,84,240,.4);opacity:.6;}
.variant-pill.checked .vp-label{text-decoration:line-through;color:var(--text3);}
.vp-label{flex:1;font-size:12px;color:var(--text2);}
.vp-price{font-size:12px;font-weight:500;color:var(--text);}
/* List card group */
.list-card-group{display:flex;gap:10px;align-items:flex-start;margin-bottom:16px;padding-bottom:16px;border-bottom:0.5px solid var(--border);}
.list-card-group:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.list-card-img{width:60px;height:84px;object-fit:contain;border-radius:5px;flex-shrink:0;border:0.5px solid var(--border);}
.list-card-info{flex:1;min-width:0;}
.card-name{font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-sub{font-size:11px;color:var(--text2);}
/* Collection list item */
.coll-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:5px;transition:background .18s,border-color .18s;}
.coll-item.not-owned{background:var(--glass);}
.coll-item.is-owned{background:var(--owned-tint);border-color:var(--owned-border);}
.coll-item .wi-img{width:52px;height:72px;object-fit:contain;border-radius:4px;flex-shrink:0;}
.card-price{font-size:13px;font-weight:500;text-align:right;flex-shrink:0;color:var(--text);}
.remove-btn{font-size:11px;color:#ffb0b8;background:none;border:none;cursor:pointer;padding:2px 0;display:block;margin-top:2px;}
.owned-badge{font-size:10px;padding:2px 7px;border-radius:6px;background:rgba(40,180,100,.2);color:#7de8b0;border:0.5px solid rgba(40,180,100,.35);display:inline-block;margin-top:3px;}
/* Grid view */
.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;max-width:100%;}
@media(min-width:700px){.grid-view{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));}}
/* 5-column cap via max width per cell trick */
.grid-view > *{max-width:100%;}
/* Flip card */
.flip-wrap{perspective:800px;}
.flip-inner{position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);}
.flip-inner.flipped{transform:rotateY(180deg);}
.flip-front,.flip-back{backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius-lg);border:0.5px solid var(--border);width:100%;}
.flip-front{background:var(--glass);padding:10px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:background .18s,border-color .18s;}
.flip-front:hover{background:var(--glass-hover);border-color:var(--border-strong);}
.flip-front.all-owned{opacity:.5;}
.flip-back{position:absolute;top:0;left:0;background:rgba(20,30,55,.97);padding:10px;transform:rotateY(180deg);display:flex;flex-direction:column;gap:4px;}
.flip-card-img{width:100%;max-width:100px;height:auto;border-radius:4px;}
.flip-card-name{font-size:11px;font-weight:500;text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.flip-card-sub{font-size:10px;color:var(--text2);text-align:center;}
.flip-card-progress{width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.flip-card-progress-fill{height:100%;background:var(--pk-blue);border-radius:2px;}
/* Grid collection card */
.grid-coll-card{background:var(--glass);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:10px;display:flex;flex-direction:column;align-items:center;gap:5px;transition:background .18s,border-color .18s;}
.grid-coll-card.is-owned{background:var(--owned-tint);border-color:var(--owned-border);}
.grid-coll-card img{width:100%;max-width:100px;height:auto;border-radius:4px;}
/* Toolbar */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.filter-btn{font-size:12px;padding:5px 12px;border-radius:8px;}
.filter-btn.active{background:rgba(39,36,219,.28);border-color:rgba(86,84,240,.5);color:#c0bfff;}
.view-toggle{display:flex;gap:4px;background:rgba(255,255,255,.05);border:0.5px solid var(--border);border-radius:8px;padding:3px;}
.view-btn{padding:5px 10px;font-size:12px;border:none;background:none;color:var(--text2);border-radius:6px;cursor:pointer;transition:all .18s;}
.view-btn.active{background:var(--glass-hover);color:var(--text);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const API="https://api.pokemontcg.io/v2";
const VARIANTS_URL="https://raw.githubusercontent.com/erinspace-png/Cardboard-Hoard/main/variants.json";
const TCGPLAYER_BASE="https://www.tcgplayer.com/search/pokemon/product?q=";

const VARIANT_LABELS={normal:"Normal",holofoil:"Holofoil",reverseHolofoil:"Reverse Holofoil",masterBallReverseHolofoil:"Master Ball Reverse Holo",pokeBallReverseHolofoil:"Poké Ball Reverse Holo",energyReverseHolofoil:"Energy Reverse Holo",ballReverseHolofoil:"Ball Reverse Holo","1stEditionHolofoil":"1st Edition Holofoil","1stEditionNormal":"1st Edition Normal",unlimitedHolofoil:"Unlimited Holofoil"};
const VARIANT_ORDER=["normal","holofoil","reverseHolofoil","pokeBallReverseHolofoil","masterBallReverseHolofoil","energyReverseHolofoil","ballReverseHolofoil","1stEditionNormal","1stEditionHolofoil","unlimitedHolofoil"];
const FALLBACK_VARIANTS={"sv8pt5":[{key:"pokeBallReverseHolofoil",label:"Poké Ball Reverse Holo",applicableTo:"all"},{key:"masterBallReverseHolofoil",label:"Master Ball Reverse Holo",applicableTo:"pokemon"}],"sv105":[{key:"pokeBallReverseHolofoil",label:"Poké Ball Reverse Holo",applicableTo:"all"},{key:"masterBallReverseHolofoil",label:"Master Ball Reverse Holo",applicableTo:"pokemon"}],"sv106":[{key:"pokeBallReverseHolofoil",label:"Poké Ball Reverse Holo",applicableTo:"all"},{key:"masterBallReverseHolofoil",label:"Master Ball Reverse Holo",applicableTo:"pokemon"}],"me2pt5":[{key:"energyReverseHolofoil",label:"Energy Reverse Holo",applicableTo:"all"},{key:"ballReverseHolofoil",label:"Ball Reverse Holo",applicableTo:"all"}]};

let SET_EXTRA_VARIANTS={};
async function loadVariantsData(){
  try{const r=await fetch(VARIANTS_URL);const d=await r.json();Object.entries(d.sets||{}).forEach(([id,data])=>{SET_EXTRA_VARIANTS[id]=data.variants;});}
  catch(e){console.warn("variants.json failed:",e);SET_EXTRA_VARIANTS=FALLBACK_VARIANTS;}
}

const lstore=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}};
const sstore=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const fmt=n=>n!=null?`$${Number(n).toFixed(2)}`:null;
const vid=(cid,vk)=>`${cid}__${vk}`;
const labelFromKey=k=>VARIANT_LABELS[k]||k.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase()).trim();
const EX_SUBTYPES=["EX","GX","V","VMAX","VSTAR","ex","Mega","BREAK","LEGEND","Prism Star","ACE SPEC","Radiant"];
const COMMON_UNCOMMON=["Common","Uncommon"];
const NO_REVERSE=["Rare Holo EX","Rare Holo GX","Rare Holo V","Rare Holo VMAX","Rare Holo VSTAR","Rare Ultra","Rare Rainbow","Rare Secret","Rare Shiny","Rare Shiny GX","Illustration Rare","Special Illustration Rare","Hyper Rare","Double Rare","Trainer Gallery Rare Holo","ACE SPEC Rare","Ultra Rare","Shiny Ultra Rare"];
const isEx=c=>(c.subtypes||[]).some(s=>EX_SUBTYPES.includes(s));
const isPokemon=c=>c.supertype==="Pokémon";
const isTrainer=c=>c.supertype==="Trainer"||c.supertype==="Energy";
const noSynthReverse=c=>isEx(c)||NO_REVERSE.includes(c.rarity)||(isTrainer(c)&&!COMMON_UNCOMMON.includes(c.rarity));

function getAPIVariants(card){
  const prices=card.tcgplayer?.prices||{};const keys=Object.keys(prices);
  if(!keys.length)return[];
  const sorted=[...VARIANT_ORDER.filter(k=>keys.includes(k)),...keys.filter(k=>!VARIANT_ORDER.includes(k)).sort()];
  return sorted.map(k=>({key:k,label:labelFromKey(k),price:prices[k]?.market??prices[k]?.mid??null,isSynth:false}));
}
function getSynthVariants(card,setId){
  if(noSynthReverse(card))return[];
  const rules=SET_EXTRA_VARIANTS[setId];if(!rules)return[];
  const apiKeys=Object.keys(card.tcgplayer?.prices||{});
  return rules.filter(r=>!apiKeys.includes(r.key)&&!(r.applicableTo==="pokemon"&&!isPokemon(card))).map(r=>({key:r.key,label:r.label,price:null,isSynth:true}));
}
function getAllVariants(card,setId){
  const api=getAPIVariants(card);const synth=getSynthVariants(card,setId);
  if(!api.length&&!synth.length)return[{key:"normal",label:"Normal",price:null,isSynth:false}];
  return[...api,...synth];
}
function groupByCard(entries){
  const groups=[],seen={};
  entries.forEach(e=>{if(!seen[e.cardId]){seen[e.cardId]=true;groups.push({cardId:e.cardId,card:e.card,variants:[]});}groups.find(g=>g.cardId===e.cardId).variants.push(e);});
  return groups;
}

function tcgUrl(card){
  const name=encodeURIComponent(card.name||"");
  const set=encodeURIComponent(card.set?.name||"");
  return `${TCGPLAYER_BASE}${name}+${set}`;
}

function VariantPill({label,price,checked,onToggle}){
  return(
    <div className={`variant-pill${checked?" checked":""}`} onClick={onToggle}>
      <input type="checkbox" checked={!!checked} onChange={()=>{}} onClick={e=>e.stopPropagation()} style={{pointerEvents:"none"}}/>
      <span className="vp-label">{label}</span>
      <span className="vp-price">{price!=null?fmt(price):<span className="no-price-badge">no price</span>}</span>
    </div>
  );
}

function CardSearch({onAdd,placeholder}){
  const [q,setQ]=useState("");const [results,setResults]=useState([]);const [loading,setLoading]=useState(false);
  const [searched,setSearched]=useState(false);const [page,setPage]=useState(1);const [hasMore,setHasMore]=useState(false);
  const PAGE_SIZE=20;
  const search=async(pg=1)=>{
    if(!q.trim())return;setLoading(true);if(pg===1){setResults([]);setSearched(true);}
    try{
      const r=await fetch(`${API}/cards?q=name:"${encodeURIComponent(q.trim())}"&pageSize=${PAGE_SIZE}&page=${pg}`);
      const d=await r.json();const newCards=d.data||[];
      setResults(prev=>pg===1?newCards:[...prev,...newCards]);
      setHasMore((d.page*d.pageSize)<d.totalCount);setPage(pg);
    }catch{if(pg===1)setResults([]);}
    setLoading(false);
  };
  return(
    <div>
      <div className="flex-gap" style={{marginBottom:12}}>
        <input type="text" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search(1)} placeholder={placeholder||"Search cards..."}/>
        <button onClick={()=>search(1)} className="btn-blue" style={{flexShrink:0}}>Search</button>
      </div>
      {loading&&page===1&&<div className="empty" style={{padding:"10px 0"}}>Searching...</div>}
      {searched&&!loading&&!results.length&&<div className="empty" style={{padding:"10px 0"}}>No results found.</div>}
      <div style={{maxHeight:400,overflowY:"auto"}}>
        {results.map(card=>{
          const variants=getAllVariants(card,card.set?.id);
          return(
            <div key={card.id} style={{marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                {card.images?.small&&<img src={card.images.small} alt={card.name} style={{width:52,height:72,objectFit:"contain",borderRadius:4,flexShrink:0}} loading="lazy"/>}
                <div><div className="card-name">{card.name}</div><div className="card-sub">{card.set?.name} · {card.rarity||"Unknown"}</div></div>
              </div>
              <div style={{paddingLeft:62,display:"flex",flexWrap:"wrap",gap:4}}>
                {variants.map(v=><button key={v.key} className="small-btn" onClick={()=>onAdd(card,v.key,v.label,v.price)} style={{fontSize:11}}>+ {v.label}{v.price!=null?` (${fmt(v.price)})`:"" }</button>)}
              </div>
            </div>
          );
        })}
        {hasMore&&<div style={{textAlign:"center",paddingTop:8}}>
          <button className="btn-blue small-btn" onClick={()=>search(page+1)} disabled={loading}>{loading?"Loading...":"Load more"}</button>
        </div>}
      </div>
    </div>
  );
}

// ── CollectionsTab ─────────────────────────────────────────────────────────────
function CollectionsTab({collections,setCollections}){
  const [active,setActive]=useState(null);const [newName,setNewName]=useState("");const [showCreate,setShowCreate]=useState(false);
  const [showSearch,setShowSearch]=useState(false);const [renaming,setRenaming]=useState(null);const [renameVal,setRenameVal]=useState("");
  const [view,setView]=useState("list");const [hideOwned,setHideOwned]=useState(false);

  const create=()=>{if(!newName.trim())return;const id=Date.now().toString();setCollections([...collections,{id,name:newName.trim(),entries:[]}]);setNewName("");setShowCreate(false);setActive(id);};
  const del=id=>{setCollections(collections.filter(l=>l.id!==id));if(active===id)setActive(null);};
  const addEntry=(lid,card,vKey,vLabel,price)=>{
    const e={uid:Date.now().toString(),card,variantKey:vKey,variantLabel:vLabel,price,owned:false};
    setCollections(collections.map(l=>l.id===lid?{...l,entries:[...l.entries,e]}:l));
  };
  const removeEntry=(lid,uid)=>setCollections(collections.map(l=>l.id===lid?{...l,entries:l.entries.filter(e=>e.uid!==uid)}:l));
  const toggleOwned=(lid,uid)=>setCollections(collections.map(l=>l.id===lid?{...l,entries:l.entries.map(e=>e.uid===uid?{...e,owned:!e.owned}:e)}:l));
  const rename=id=>{if(!renameVal.trim())return;setCollections(collections.map(l=>l.id===id?{...l,name:renameVal.trim()}:l));setRenaming(null);};

  const cur=collections.find(l=>l.id===active);
  const entries=cur?.entries||[];
  const visEntries=hideOwned?entries.filter(e=>!e.owned):entries;
  const ownedCount=entries.filter(e=>e.owned).length;

  return(
    <div>
      <div className="pill-wrap">
        {collections.map(l=><span key={l.id} className={`pill${active===l.id?" pill-red":""}`} onClick={()=>{setActive(l.id);setShowSearch(false);}}>{l.name}<span style={{fontSize:11,opacity:.6,marginLeft:4}}>({(l.entries||[]).length})</span></span>)}
        <button onClick={()=>setShowCreate(!showCreate)}>+ New Collection</button>
      </div>
      {showCreate&&<div className="flex-gap" style={{marginBottom:16}}><input type="text" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&create()} placeholder="Collection name..."/><button className="btn-blue" onClick={create}>Create</button><button onClick={()=>setShowCreate(false)}>Cancel</button></div>}
      {cur&&(
        <div>
          <div className="row" style={{marginBottom:12,flexWrap:"wrap",gap:8}}>
            {renaming===cur.id
              ?<><input type="text" value={renameVal} onChange={e=>setRenameVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&rename(cur.id)} style={{maxWidth:200}}/><button className="btn-blue small-btn" onClick={()=>rename(cur.id)}>Save</button><button className="small-btn" onClick={()=>setRenaming(null)}>Cancel</button></>
              :<><h3 style={{fontSize:15,fontWeight:500}}>{cur.name}</h3><span style={{fontSize:12,color:"var(--text2)"}}>{ownedCount}/{entries.length} owned</span><button className="small-btn" onClick={()=>{setRenaming(cur.id);setRenameVal(cur.name);}}>Rename</button><button className="small-btn btn-red" onClick={()=>del(cur.id)}>Delete</button></>}
            <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <button className={`small-btn filter-btn${hideOwned?" active":""}`} onClick={()=>setHideOwned(h=>!h)}>{hideOwned?"Showing unwanted":"Hide owned"}</button>
              <div className="view-toggle"><button className={`view-btn${view==="list"?" active":""}`} onClick={()=>setView("list")}>List</button><button className={`view-btn${view==="grid"?" active":""}`} onClick={()=>setView("grid")}>Grid</button></div>
              <button className="btn-blue small-btn" onClick={()=>setShowSearch(!showSearch)}>{showSearch?"Hide search":"+ Add cards"}</button>
            </div>
          </div>
          {showSearch&&<div className="search-box"><CardSearch onAdd={(card,vKey,vLabel,price)=>addEntry(cur.id,card,vKey,vLabel,price)} placeholder="Search for a card..."/></div>}
          {!entries.length&&!showSearch&&<div className="empty">No cards yet. Click "+ Add cards" to search.</div>}

          {view==="list"&&(
            <div>
              {visEntries.map(e=>(
                <div key={e.uid} className={`coll-item${e.owned?" is-owned":" not-owned"}`}>
                  {e.card.images?.small&&<img src={e.card.images.small} alt={e.card.name} className="wi-img" loading="lazy"/>}
                  <div style={{flex:1,minWidth:0}}>
                    <a href={tcgUrl(e.card)} target="_blank" rel="noopener noreferrer" style={{color:"var(--text)",textDecoration:"none"}}>
                      <div className="card-name" style={{textDecoration:"underline",textDecorationColor:"var(--text3)",textUnderlineOffset:3}}>{e.card.name}</div>
                    </a>
                    <div className="card-sub">{e.card.set?.name} · {e.card.rarity||"Unknown"}</div>
                    <span className="variant-tag">{e.variantLabel}</span>
                    {e.owned&&<span className="owned-badge">Owned</span>}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    <div className="card-price">{e.price!=null?fmt(e.price):<span className="no-price-badge">no price</span>}</div>
                    <button className={`small-btn${e.owned?" btn-green":""}`} style={{fontSize:11}} onClick={()=>toggleOwned(cur.id,e.uid)}>{e.owned?"Owned":"Mark owned"}</button>
                    <button className="remove-btn" onClick={()=>removeEntry(cur.id,e.uid)}>remove</button>
                  </div>
                </div>
              ))}
            </div>
          )}
          {view==="grid"&&(
            <div className="grid-view">
              {visEntries.map(e=>(
                <div key={e.uid} className={`grid-coll-card${e.owned?" is-owned":""}`}>
                  {e.card.images?.small&&<img src={e.card.images.small} alt={e.card.name} loading="lazy"/>}
                  <div className="flip-card-name">{e.card.name}</div>
                  <div className="flip-card-sub">{e.variantLabel}</div>
                  <div className="flip-card-sub">{e.price!=null?fmt(e.price):"—"}</div>
                  {e.owned&&<span className="owned-badge">Owned</span>}
                  <button className={`small-btn${e.owned?" btn-green":""}`} style={{fontSize:10,padding:"3px 8px",width:"100%",marginTop:2}} onClick={()=>toggleOwned(cur.id,e.uid)}>{e.owned?"Owned":"Mark owned"}</button>
                  <button className="remove-btn" style={{textAlign:"center",width:"100%"}} onClick={()=>removeEntry(cur.id,e.uid)}>remove</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      {!cur&&collections.length>0&&<div className="empty">Select a collection above.</div>}
      {!collections.length&&!showCreate&&<div className="empty">No collections yet. Create one to get started.</div>}
    </div>
  );
}

// ── MasterSetsTab ─────────────────────────────────────────────────────────────
function MasterSetsTab({masterSets,setMasterSets}){
  const [active,setActive]=useState(null);const [q,setQ]=useState("");const [setResults,setSetResults]=useState([]);
  const [loadingSet,setLoadingSet]=useState(false);const [loadingCards,setLoadingCards]=useState(false);
  const [showSearch,setShowSearch]=useState(false);const [collapsed,setCollapsed]=useState({});
  const [hideOwned,setHideOwned]=useState(false);const [view,setView]=useState("list");
  const [flipped,setFlipped]=useState(null);

  const searchSets=async()=>{if(!q.trim())return;setLoadingSet(true);try{const r=await fetch(`${API}/sets?q=name:"${encodeURIComponent(q.trim())}"&pageSize=10`);const d=await r.json();setSetResults(d.data||[]);}catch{setSetResults([]);}setLoadingSet(false);};

  const addSet=async(set)=>{
    if(masterSets.find(s=>s.id===set.id)){setShowSearch(false);setActive(set.id);return;}
    setLoadingCards(true);
    try{
      let all=[],page=1,total=999;
      while(all.length<total){const r=await fetch(`${API}/cards?q=set.id:${set.id}&pageSize=250&page=${page}`);const d=await r.json();total=d.totalCount;all=[...all,...(d.data||[])];if(!(d.data||[]).length)break;page++;}
      all.sort((a,b)=>(parseInt(a.number)||0)-(parseInt(b.number)||0));
      const entries=[];
      all.forEach(card=>{getAllVariants(card,set.id).forEach(v=>{entries.push({id:vid(card.id,v.key),cardId:card.id,card,variantKey:v.key,variantLabel:v.label,price:v.price,isSynth:v.isSynth});});});
      setMasterSets(prev=>[...prev,{id:set.id,name:set.name,logo:set.images?.logo,entries,checked:{}}]);
      setActive(set.id);
    }catch(e){console.error(e);}
    setLoadingCards(false);setShowSearch(false);setSetResults([]);setQ("");
  };

  const toggleEntry=(setId,entryId)=>setMasterSets(prev=>prev.map(s=>s.id===setId?{...s,checked:{...s.checked,[entryId]:!s.checked[entryId]}}:s));
  const checkAll=(setId,cardId)=>setMasterSets(prev=>prev.map(s=>{if(s.id!==setId)return s;const nc={...s.checked};(s.entries||[]).filter(e=>e.cardId===cardId).forEach(e=>{nc[e.id]=true;});return{...s,checked:nc};}));
  const removeSet=id=>{setMasterSets(prev=>prev.filter(s=>s.id!==id));if(active===id)setActive(null);};
  const cur=masterSets.find(s=>s.id===active);

  return(
    <div>
      <div className="pill-wrap">
        {masterSets.map(s=>{const owned=Object.values(s.checked).filter(Boolean).length;const tot=(s.entries||[]).length;return(
          <span key={s.id} className={`pill${active===s.id?" pill-blue":""}`} onClick={()=>setActive(s.id)}>{s.name}<span style={{fontSize:11,opacity:.6,marginLeft:4}}>({owned}/{tot})</span></span>
        );})}
        <button className="btn-blue small-btn" onClick={()=>setShowSearch(!showSearch)}>+ Add Set</button>
      </div>

      {showSearch&&(
        <div className="search-box">
          <div className="flex-gap" style={{marginBottom:12}}>
            <input type="text" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchSets()} placeholder="Search Pokémon sets..."/>
            <button className="btn-blue" onClick={searchSets}>Search</button>
            <button onClick={()=>{setShowSearch(false);setSetResults([]);}}>Cancel</button>
          </div>
          {loadingSet&&<div style={{fontSize:14,color:"var(--text2)"}}>Searching...</div>}
          {loadingCards&&<div style={{fontSize:14,color:"var(--text2)"}}>Loading cards and variants…</div>}
          {setResults.map(s=>(
            <div key={s.id} className="list-card-group" style={{padding:"8px 0",borderBottom:"none",marginBottom:6}}>
              {s.images?.logo&&<img src={s.images.logo} alt={s.name} style={{height:26,width:"auto",objectFit:"contain",flexShrink:0}}/>}
              <div style={{flex:1}}><div className="card-name" style={{fontSize:13}}>{s.name}</div><div className="card-sub">{s.series} · {s.printedTotal||s.total||"?"} cards</div></div>
              <button className="small-btn btn-blue" onClick={()=>addSet(s)}>Add</button>
            </div>
          ))}
        </div>
      )}

      {cur&&(()=>{
        const owned=Object.values(cur.checked).filter(Boolean).length;
        const total=(cur.entries||[]).length;
        const pct=total?Math.round(owned/total*100):0;
        const remaining=total-owned;
        const ownedVal=(cur.entries||[]).filter(e=>cur.checked[e.id]).reduce((t,e)=>t+(e.price||0),0);
        const remainVal=(cur.entries||[]).filter(e=>!cur.checked[e.id]).reduce((t,e)=>t+(e.price||0),0);
        const isOpen=!collapsed[cur.id];
        const groups=groupByCard(cur.entries||[]);
        const visGroups=hideOwned?groups.filter(g=>g.variants.some(e=>!cur.checked[e.id])):groups;
        return(
          <div>
            <div className="glass-card set-card">
              <div className="set-top">
                {cur.logo&&<img src={cur.logo} alt={cur.name} style={{height:48,objectFit:"contain",flexShrink:0}}/>}
                <div style={{flex:1,minWidth:0}}>
                  <div className="set-name">{cur.name}</div>
                  <div className="set-sub">{owned} / {total} cards collected ({pct}%)</div>
                  <div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
                </div>
                <button className="small-btn btn-red" style={{flexShrink:0}} onClick={()=>removeSet(cur.id)}>Remove</button>
              </div>
              <div className="stat-grid">
                <div className="stat-tile"><div className="stat-lbl">Cards remaining</div><div className="stat-val">{remaining}</div></div>
                <div className="stat-tile"><div className="stat-lbl">Completion</div><div className="stat-val">{pct}%</div></div>
                <div className="stat-tile"><div className="stat-lbl">Owned value</div><div className="stat-val">{fmt(ownedVal)||"$0.00"}</div></div>
                <div className="stat-tile"><div className="stat-lbl">Remaining cost</div><div className="stat-val">{fmt(remainVal)||"$0.00"}</div></div>
              </div>
            </div>

            <div className="toolbar">
              <button className="small-btn" onClick={()=>setCollapsed(p=>({...p,[cur.id]:!p[cur.id]}))}>
                {isOpen?"▼ Hide cards":"▶ Show cards"}
              </button>
              <button className={`small-btn filter-btn${hideOwned?" active":""}`} onClick={()=>setHideOwned(h=>!h)}>
                {hideOwned?"Showing unowned":"Hide owned"}
              </button>
              <div style={{marginLeft:"auto"}}>
                <div className="view-toggle">
                  <button className={`view-btn${view==="list"?" active":""}`} onClick={()=>setView("list")}>List</button>
                  <button className={`view-btn${view==="grid"?" active":""}`} onClick={()=>setView("grid")}>Grid</button>
                </div>
              </div>
            </div>

            <div className={`collapsible${isOpen?" open":" closed"}`}>
              {view==="list"&&(
                <div className="scrollable">
                  {visGroups.map(g=>{
                    const allChecked=g.variants.every(e=>cur.checked[e.id]);
                    const visVars=hideOwned?g.variants.filter(e=>!cur.checked[e.id]):g.variants;
                    return(
                      <div key={g.cardId} className="list-card-group">
                        {g.card.images?.small&&<a href={tcgUrl(g.card)} target="_blank" rel="noopener noreferrer"><img src={g.card.images.small} alt={g.card.name} className="list-card-img" loading="lazy"/></a>}
                        <div className="list-card-info">
                          <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:1}}>
                            <a href={tcgUrl(g.card)} target="_blank" rel="noopener noreferrer" style={{color:"var(--text)",textDecoration:"underline",textDecorationColor:"var(--text3)",textUnderlineOffset:3}}>
                              <div className="card-name">{g.card.name}</div>
                            </a>
                            {!allChecked&&<button className="small-btn btn-blue" style={{fontSize:10,padding:"2px 8px",flexShrink:0}} onClick={()=>checkAll(cur.id,g.cardId)}>Check all</button>}
                          </div>
                          <div className="card-sub" style={{marginBottom:6}}>#{g.card.number} · {g.card.rarity||"Unknown"}</div>
                          {visVars.map(e=>(
                            <VariantPill key={e.id} label={e.variantLabel} price={e.price} checked={!!cur.checked[e.id]} onToggle={()=>toggleEntry(cur.id,e.id)}/>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              {view==="grid"&&(
                <div className="grid-view">
                  {visGroups.map(g=>{
                    const checkedCount=g.variants.filter(e=>cur.checked[e.id]).length;
                    const tot=g.variants.length;
                    const allChecked=checkedCount===tot;
                    const isFlipped=flipped===g.cardId;
                    // Estimate back height: header ~52px + variants * 34px + check-all btn ~30px + flip btn ~30px + padding
                    const backH=52+(tot*34)+(allChecked?0:30)+30+20;
                    return(
                      <div key={g.cardId} className="flip-wrap" style={{minHeight:backH}}>
                        <div className={`flip-inner${isFlipped?" flipped":""}`} style={{minHeight:backH}}>
                          {/* Front */}
                          <div className={`flip-front${allChecked?" all-owned":""}`} style={{minHeight:backH}} onClick={()=>setFlipped(isFlipped?null:g.cardId)}>
                            {g.card.images?.small&&<img src={g.card.images.small} alt={g.card.name} className="flip-card-img" loading="lazy"/>}
                            <a href={tcgUrl(g.card)} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{textDecoration:"none",width:"100%"}}>
                              <div className="flip-card-name" style={{textDecoration:"underline",textDecorationColor:"var(--text3)",textUnderlineOffset:2}}>{g.card.name}</div>
                            </a>
                            <div className="flip-card-sub">#{g.card.number} · {g.card.rarity}</div>
                            <div className="flip-card-sub">{checkedCount}/{tot} owned</div>
                            <div className="flip-card-progress"><div className="flip-card-progress-fill" style={{width:`${tot?checkedCount/tot*100:0}%`}}/></div>
                          </div>
                          {/* Back */}
                          <div className="flip-back" style={{minHeight:backH}}>
                            <div className="flip-card-name" style={{marginBottom:1}}>{g.card.name}</div>
                            <div className="flip-card-sub" style={{marginBottom:6}}>#{g.card.number} · {g.card.rarity}</div>
                            {g.variants.map(e=>(
                              <VariantPill key={e.id} label={e.variantLabel} price={e.price} checked={!!cur.checked[e.id]} onToggle={()=>toggleEntry(cur.id,e.id)}/>
                            ))}
                            {!allChecked&&<button className="small-btn btn-blue" style={{fontSize:10,width:"100%",marginTop:4}} onClick={e=>{e.stopPropagation();checkAll(cur.id,g.cardId);}}>Check all</button>}
                            <button className="small-btn" style={{fontSize:10,width:"100%",marginTop:4}} onClick={()=>setFlipped(null)}>Flip back</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        );
      })()}
      {!cur&&masterSets.length>0&&<div className="empty">Select a set above.</div>}
      {!masterSets.length&&!showSearch&&<div className="empty">No master sets yet. Click "+ Add Set" to begin.</div>}
    </div>
  );
}

// ── BuyListTab ────────────────────────────────────────────────────────────────
function BuyListTab({collections,masterSets,setMasterSets}){
  const [collapsed,setCollapsed]=useState({});
  const toggle=id=>setCollapsed(p=>({...p,[id]:!p[id]}));
  const sections=[];
  masterSets.forEach(s=>{const needed=(s.entries||[]).filter(e=>!s.checked[e.id]);if(needed.length)sections.push({id:s.id,name:s.name,logo:s.logo,entries:needed,type:"master"});});
  collections.forEach(l=>{
    const unwanted=(l.entries||[]).filter(e=>!e.owned);
    if(unwanted.length)sections.push({id:l.id,name:l.name,logo:null,entries:unwanted,type:"collection"});
  });
  const grand=sections.reduce((t,s)=>t+s.entries.reduce((st,e)=>st+(e.price||0),0),0);
  if(!sections.length)return<div className="empty">Your buy list is empty.</div>;
  return(
    <div>
      <div className="grand-total">
        <div><div className="total-lbl">Estimated total</div><div className="total-val">{fmt(grand)||"$0.00"}</div></div>
        <div style={{textAlign:"right"}}><div className="total-lbl">Items needed</div><div className="total-val">{sections.reduce((t,s)=>t+s.entries.length,0)}</div></div>
      </div>
      {sections.map(sec=>{const sub=sec.entries.reduce((t,e)=>t+(e.price||0),0);const isOpen=!collapsed[sec.id];return(
        <div key={sec.id} style={{marginBottom:10}}>
          <div className="sec-hdr" onClick={()=>toggle(sec.id)}>
            {sec.logo&&<img src={sec.logo} alt={sec.name} style={{height:20,objectFit:"contain",flexShrink:0}}/>}
            {!sec.logo&&<span className="wishlist-tag">collection</span>}
            <span className="sec-name">{sec.name}</span>
            <span className="sec-meta">{sec.entries.length} · {fmt(sub)||"$0.00"}</span>
            <span className={`chevron${isOpen?" open":""}`}>▼</span>
          </div>
          <div className={`collapsible${isOpen?" open":" closed"}`}>
            {sec.type==="collection"
              ?sec.entries.map(e=>(
                <div key={e.uid} className="list-card-group">
                  {e.card.images?.small&&<img src={e.card.images.small} alt={e.card.name} className="list-card-img" loading="lazy"/>}
                  <div style={{flex:1,minWidth:0}}>
                    <a href={tcgUrl(e.card)} target="_blank" rel="noopener noreferrer" style={{color:"var(--text)",textDecoration:"underline",textDecorationColor:"var(--text3)",textUnderlineOffset:3}}>
                      <div className="card-name">{e.card.name}</div>
                    </a>
                    <div className="card-sub">{e.card.set?.name}</div>
                    <span className="variant-tag">{e.variantLabel}</span>
                  </div>
                  <div className="card-price">{e.price!=null?fmt(e.price):<span className="no-price-badge">no price</span>}</div>
                </div>
              ))
              :groupByCard(sec.entries).map(g=>(
                <div key={g.cardId} className="list-card-group">
                  {g.card.images?.small&&<img src={g.card.images.small} alt={g.card.name} className="list-card-img" loading="lazy"/>}
                  <div className="list-card-info">
                    <a href={tcgUrl(g.card)} target="_blank" rel="noopener noreferrer" style={{color:"var(--text)",textDecoration:"underline",textDecorationColor:"var(--text3)",textUnderlineOffset:3}}>
                      <div className="card-name" style={{marginBottom:1}}>{g.card.name}</div>
                    </a>
                    <div className="card-sub" style={{marginBottom:6}}>#{g.card.number} · {g.card.set?.name}</div>
                    {g.variants.map(e=>(
                      <VariantPill key={e.id} label={e.variantLabel} price={e.price} checked={false}
                        onToggle={()=>setMasterSets(prev=>prev.map(s=>s.id===sec.id?{...s,checked:{...s.checked,[e.id]:true}}:s))}/>
                    ))}
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      );})}
    </div>
  );
}

// ── StatsTab ──────────────────────────────────────────────────────────────────
function StatsTab({collections,masterSets}){
  const totalOwned=masterSets.reduce((t,s)=>t+Object.values(s.checked).filter(Boolean).length,0);
  const totalNeeded=masterSets.reduce((t,s)=>t+(s.entries||[]).filter(e=>!s.checked[e.id]).length,0);
  const collTotal=collections.reduce((t,l)=>t+(l.entries||[]).length,0);
  const collOwned=collections.reduce((t,l)=>t+(l.entries||[]).filter(e=>e.owned).length,0);
  const buyVal=masterSets.reduce((t,s)=>t+(s.entries||[]).filter(e=>!s.checked[e.id]).reduce((st,e)=>st+(e.price||0),0),0)
    +collections.reduce((t,l)=>t+(l.entries||[]).filter(e=>!e.owned).reduce((st,e)=>st+(e.price||0),0),0);
  return(
    <div>
      <div className="stat-card-grid">
        {[["Variants owned",totalOwned],["Variants needed",totalNeeded],["Collection entries",collTotal],["Est. buy list value",fmt(buyVal)||"$0.00"]].map(([l,v])=>(
          <div key={l} className="stat-card"><div className="stat-card-lbl">{l}</div><div className="stat-card-val">{v}</div></div>
        ))}
      </div>
      {masterSets.length>0&&(
        <div>
          <h3 style={{fontSize:15,fontWeight:500,marginBottom:12}}>Master set progress</h3>
          {masterSets.map(s=>{const owned=Object.values(s.checked).filter(Boolean).length;const total=(s.entries||[]).length;const pct=total?Math.round(owned/total*100):0;return(
            <div key={s.id} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13}}>{s.name}</span><span style={{fontSize:13,color:"var(--text2)"}}>{owned}/{total} ({pct}%)</span></div>
              <div className="progress-track"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
            </div>
          );})}
        </div>
      )}
      {collections.length>0&&(
        <div style={{marginTop:20}}>
          <h3 style={{fontSize:15,fontWeight:500,marginBottom:12}}>Collections</h3>
          {collections.map(l=>{
            const owned=(l.entries||[]).filter(e=>e.owned).length;
            const total=(l.entries||[]).length;
            return(
              <div key={l.id} style={{display:"flex",justifyContent:"space-between",padding:"9px 12px",background:"var(--glass)",borderRadius:"var(--radius)",marginBottom:6,border:"0.5px solid var(--border)"}}>
                <span style={{fontSize:13}}>{l.name}</span>
                <span style={{fontSize:13,color:"var(--text2)"}}>{owned}/{total} owned</span>
              </div>
            );
          })}
        </div>
      )}
      {!masterSets.length&&!collections.length&&<div className="empty">No data yet.</div>}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
const TABS=["Collections","Master Sets","Buy List","Stats"];
function App(){
  const [tab,setTab]=useState(0);const [ready,setReady]=useState(false);
  // Migrate old wishlists key -> collections key, preserving data
  const [collections,setCRaw]=useState(()=>{
    const existing=lstore("pkm_collections2",null);
    if(existing)return existing;
    const old=lstore("pkm_wishlists2",[]);
    return old.map(l=>({...l,entries:(l.entries||[]).map(e=>({...e,owned:e.owned??false}))}));
  });
  const [masterSets,setMRaw]=useState(()=>lstore("pkm_mastersets2",[]));
  const setCollections=v=>{const n=typeof v==="function"?v(collections):v;setCRaw(n);sstore("pkm_collections2",n);};
  const setMasterSets=v=>{const n=typeof v==="function"?v(masterSets):v;setMRaw(n);sstore("pkm_mastersets2",n);};
  useEffect(()=>{loadVariantsData().then(()=>setReady(true));},[]);
  if(!ready)return<div style={{padding:60,textAlign:"center",color:"var(--text2)",fontSize:14}}>Loading...</div>;
  const activeClass=tab===2?"active-red":"active-blue";
  return(
    <div>
      <div className="app-header">
        <div className="header-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#a8a6ff" strokeWidth="1.5"/><line x1="2" y1="12" x2="22" y2="12" stroke="#a8a6ff" strokeWidth="1.5"/><circle cx="12" cy="12" r="3" fill="#a8a6ff"/></svg>
        </div>
        <h1>Cardbhoard: A Card Collecting Tracker</h1>
      </div>
      <div className="tab-bar">
        {TABS.map((t,i)=>(
          <button key={t} className={`tab-btn${tab===i?" "+activeClass:""}`} onClick={()=>setTab(i)}>
            {t}
            {t==="Collections"&&collections.length>0&&<span className="badge">{collections.length}</span>}
            {t==="Master Sets"&&masterSets.length>0&&<span className="badge">{masterSets.length}</span>}
          </button>
        ))}
      </div>
      {tab===0&&<CollectionsTab collections={collections} setCollections={setCollections}/>}
      {tab===1&&<MasterSetsTab masterSets={masterSets} setMasterSets={setMasterSets}/>}
      {tab===2&&<BuyListTab collections={collections} masterSets={masterSets} setMasterSets={setMasterSets}/>}
      {tab===3&&<StatsTab collections={collections} masterSets={masterSets}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
